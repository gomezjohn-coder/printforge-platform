name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [artist-service, product-service, order-service, monolith-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: pytest tests/ -v

      - name: Build Docker image
        working-directory: services/${{ matrix.service }}
        run: docker build -t ${{ matrix.service }}:${{ github.sha }} .

