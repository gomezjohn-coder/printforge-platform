apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: order-service-monitor
  labels:
    {{- include "order-service.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: {{ include "order-service.name" . }}
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
