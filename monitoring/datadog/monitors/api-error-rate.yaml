# PrintForge Monitor: API 5xx Error Rate
# Priority: P1 (page immediately)
# SLO: SLO-001 Checkout Availability (99.9%)
#
# This monitor fires when the 5xx error rate exceeds 1% over a 5-minute
# rolling window. A sustained error rate at this level will exhaust the
# monthly error budget within ~7 hours.

name: "[P1] PrintForge Checkout — 5xx Error Rate > 1%"
type: query alert
priority: 1

query: >
  sum(last_5m):
    sum:http_requests_total{
      service:order-service,
      status_code:5*
    }.as_count()
  /
    sum:http_requests_total{
      service:order-service
    }.as_count()
  * 100 > 1

message: |
  {{#is_alert}}
  **P1 ALERT: API 5xx error rate is {{value}}% (threshold: 1%)**

  The order-service is returning an elevated rate of server errors.
  This directly impacts SLO-001 (API Availability 99.9%) and is burning
  error budget at an accelerated rate.

  **Impact:** Customers may experience failed requests for product browsing,
  search, and order placement.

  **Immediate actions:**
  1. Check recent deployments: `printforge canary status`
  2. Review error logs: `printforge logs order-service | grep "level.*error"`
  3. Check downstream dependencies (PostgreSQL, Redis, artist-service)
  4. If caused by a canary: `printforge rollback order-service`

  **Runbook:** https://runbooks.printforge.io/api/5xx-error-rate
  **Dashboard:** https://app.datadoghq.com/dashboard/printforge-service-overview
  **SLO Status:** https://app.datadoghq.com/slo?slo_id=api-availability
  {{/is_alert}}

  {{#is_warning}}
  **Warning: API 5xx error rate is {{value}}% (warning threshold: 0.5%)**

  Error rate is elevated but below the critical threshold. Monitor closely.
  {{/is_warning}}

  {{#is_recovery}}
  **Recovered: API 5xx error rate has returned to normal ({{value}}%)**
  {{/is_recovery}}

  @slack-printforge-alerts
  @pagerduty-printforge-platform

tags:
  - service:order-service
  - team:platform
  - env:production
  - slo:checkout-availability
  - severity:p1

options:
  thresholds:
    critical: 1
    warning: 0.5
  notify_no_data: true
  no_data_timeframe: 10
  notify_audit: true
  require_full_window: false
  include_tags: true
  evaluation_delay: 60
  new_group_delay: 60

  # Escalation: re-notify every 15 minutes if unacknowledged
  renotify_interval: 15
  renotify_occurrences: 4
  renotify_statuses:
    - alert

  # Avoid flapping
  min_failure_duration: 300
  min_location_failed: 1

escalation:
  - after: 0m
    notify:
      - "@slack-printforge-alerts"
      - "@pagerduty-printforge-platform"
  - after: 15m
    notify:
      - "@pagerduty-printforge-platform-escalation"
  - after: 30m
    notify:
      - "@slack-printforge-incidents"
      - "@pagerduty-printforge-engineering-manager"
