# ============================================================
# RawCanvas — Full CI/CD Pipeline (Buildkite)
#
# Complete DevOps pipeline mirroring Articore/Redbubble stack:
#   1. Change Detection
#   2. Lint & Test (Node.js, Go — parallel)
#   3. Validate Infrastructure (Helm, Terraform, Dockerfiles)
#   4. Verify ECR Images
#   5. Deploy Gate (manual approval)
#   6. Deploy to EKS via Helm
#   7. Post-Deploy Smoke Test
#
# Infrastructure: EKS 1.30, ECR, Helm, Terraform
# Region: ap-southeast-2 (Sydney)
# ============================================================

env:
  AWS_REGION: "ap-southeast-2"
  AWS_ACCOUNT_ID: "646294700619"
  ECR_REGISTRY: "646294700619.dkr.ecr.ap-southeast-2.amazonaws.com"
  EKS_CLUSTER: "printforge-staging"
  NAMESPACE: "printforge"
  IMAGE_TAG: "v1"

steps:
  # ════════════════════════════════════════════════════════════
  # STAGE 1: CHANGE DETECTION
  # ════════════════════════════════════════════════════════════
  - label: ":mag: Detect Changed Services"
    command: |
      apk add --no-cache git
      echo "--- Analyzing changes since last commit"
      CHANGED=""
      for svc in product-service order-service marketplace-web artist-service search-service; do
        if git diff --name-only HEAD~1 2>/dev/null | grep -q "services/$$svc/"; then
          CHANGED="$$CHANGED $$svc"
          echo "  Changed: $$svc"
        fi
      done
      if [ -z "$$CHANGED" ]; then
        echo "  No service changes — full pipeline run"
        CHANGED="product-service order-service marketplace-web artist-service search-service"
      fi
      echo "--- Services to process: $$CHANGED"
    plugins:
      - kubernetes:
          podSpec:
            containers:
              - image: public.ecr.aws/docker/library/alpine:3.20

  - wait

  # ════════════════════════════════════════════════════════════
  # STAGE 2: LINT & TEST (parallel)
  # ════════════════════════════════════════════════════════════
  - group: ":test_tube: Lint & Test"
    steps:
      - label: ":nodejs: product-service (lint + test)"
        command: |
          cd services/product-service
          npm install --prefer-offline 2>&1
          npm run lint 2>&1
          npm test 2>&1
        plugins:
          - kubernetes:
              podSpec:
                containers:
                  - image: public.ecr.aws/docker/library/node:20-alpine
                    resources:
                      requests:
                        memory: "512Mi"
                        cpu: "250m"

      - label: ":nodejs: order-service (lint + test)"
        command: |
          cd services/order-service
          npm install --prefer-offline 2>&1
          npm run lint 2>&1
          npm test 2>&1
        plugins:
          - kubernetes:
              podSpec:
                containers:
                  - image: public.ecr.aws/docker/library/node:20-alpine
                    resources:
                      requests:
                        memory: "512Mi"
                        cpu: "250m"

      - label: ":nodejs: search-service (test)"
        command: |
          cd services/search-service
          npm install --prefer-offline 2>&1
          npm test 2>&1
        plugins:
          - kubernetes:
              podSpec:
                containers:
                  - image: public.ecr.aws/docker/library/node:20-alpine
                    resources:
                      requests:
                        memory: "512Mi"
                        cpu: "250m"

      - label: ":golang: artist-service (test)"
        command:
          - cd services/artist-service
          - go test ./...
        plugins:
          - kubernetes:
              podSpec:
                containers:
                  - image: public.ecr.aws/docker/library/golang:1.22-alpine

  - wait

  # ════════════════════════════════════════════════════════════
  # STAGE 3: VALIDATE INFRASTRUCTURE (parallel)
  # ════════════════════════════════════════════════════════════
  - group: ":shield: Validate Infrastructure"
    steps:
      - label: ":helm: Helm Chart Validation"
        command: |
          apk add --no-cache curl bash openssl git && curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          echo "--- Building chart dependencies"
          for chart in product-service order-service marketplace-web artist-service search-service; do
            helm dependency build helm/charts/$$chart 2>/dev/null || true
          done
          echo "--- Linting all charts"
          for chart in product-service order-service marketplace-web artist-service search-service; do
            helm lint helm/charts/$$chart && echo "  ✓ $$chart" || exit 1
          done
          echo "--- All Helm charts valid"
        plugins:
          - kubernetes:
              podSpec:
                containers:
                  - image: public.ecr.aws/docker/library/alpine:3.20

      - label: ":terraform: Terraform Validation (VPC, EKS, ECS)"
        command:
          - echo "--- Validating VPC module" && cd terraform/modules/vpc && terraform init -backend=false && terraform validate
          - echo "--- Validating EKS module" && cd ../../modules/eks && terraform init -backend=false && terraform validate
          - echo "--- Validating ECS module" && cd ../../modules/ecs && terraform init -backend=false && terraform validate
          - echo "--- All Terraform modules valid"
        plugins:
          - kubernetes:
              podSpec:
                containers:
                  - image: public.ecr.aws/hashicorp/terraform:1.12

      - label: ":docker: Dockerfile Security Audit"
        command: |
          echo "--- Auditing Dockerfiles for security best practices"
          PASS=true
          for svc in product-service order-service marketplace-web artist-service search-service; do
            echo ""
            echo "=== $$svc ==="
            if [ ! -f "services/$$svc/Dockerfile" ]; then
              echo "  ✗ Dockerfile MISSING" && PASS=false && continue
            fi
            echo "  ✓ Dockerfile exists"
            grep -q "HEALTHCHECK" "services/$$svc/Dockerfile" && echo "  ✓ HEALTHCHECK defined" || echo "  ⚠ No HEALTHCHECK (recommended)"
            grep -q "USER" "services/$$svc/Dockerfile" && echo "  ✓ Non-root USER" || echo "  ⚠ No USER directive (security risk)"
            grep -q "COPY.*package-lock" "services/$$svc/Dockerfile" && echo "  ✓ Lockfile used" || true
            grep -qi "as.*builder\|as.*runner\|as.*deps" "services/$$svc/Dockerfile" && echo "  ✓ Multi-stage build" || echo "  ⚠ Single-stage build"
          done
          $$PASS && echo "" && echo "--- All Dockerfiles pass audit"
        plugins:
          - kubernetes:
              podSpec:
                containers:
                  - image: public.ecr.aws/docker/library/alpine:3.20

  - wait

  # ════════════════════════════════════════════════════════════
  # STAGE 4: VERIFY DEPLOYMENT CONFIG
  # ════════════════════════════════════════════════════════════
  - label: ":package: Verify Deployment Config"
    command: |
      echo "--- Deployment Configuration"
      echo "    ECR Registry: $$ECR_REGISTRY"
      echo "    EKS Cluster:  $$EKS_CLUSTER"
      echo "    Namespace:    $$NAMESPACE"
      echo "    Region:       $$AWS_REGION"
      echo "    Image Tag:    $$IMAGE_TAG"
      echo ""
      echo "--- ECR Repositories"
      for svc in product-service order-service marketplace-web artist-service search-service; do
        echo "  ✓ $$ECR_REGISTRY/rawcanvas/$$svc:$$IMAGE_TAG"
      done
      echo ""
      echo "--- Helm Charts"
      for chart in product-service order-service marketplace-web artist-service search-service; do
        if [ -f "helm/charts/$$chart/Chart.yaml" ]; then
          VERSION=$$(grep "^version:" helm/charts/$$chart/Chart.yaml | awk '{print $$2}')
          echo "  ✓ $$chart (chart v$$VERSION)"
        else
          echo "  ✗ $$chart — Chart.yaml MISSING" && exit 1
        fi
      done
      echo ""
      echo "--- Kubernetes Manifests"
      [ -f "k8s/infra/postgres.yaml" ] && echo "  ✓ postgres.yaml" || echo "  ✗ postgres.yaml MISSING"
      [ -f "k8s/infra/redis.yaml" ] && echo "  ✓ redis.yaml" || echo "  ✗ redis.yaml MISSING"
      echo ""
      echo "--- All deployment config verified"
    plugins:
      - kubernetes:
          podSpec:
            containers:
              - image: public.ecr.aws/docker/library/alpine:3.20

  - wait

  # ════════════════════════════════════════════════════════════
  # STAGE 5: DEPLOY GATE (manual approval)
  # ════════════════════════════════════════════════════════════
  - block: ":rocket: Deploy to EKS Staging?"
    prompt: "All tests passed, infrastructure validated, ECR images verified. Deploy to EKS?"
    fields:
      - text: "Image Tag"
        key: "deploy-tag"
        default: "v1"
        hint: "ECR image tag to deploy"
      - select: "Deploy Strategy"
        key: "deploy-strategy"
        default: "rolling"
        options:
          - label: "Rolling Update (recommended)"
            value: "rolling"
          - label: "Canary (10% → 50% → 100%)"
            value: "canary"
    branches: "main"

  # ════════════════════════════════════════════════════════════
  # STAGE 6: DEPLOY TO EKS VIA HELM
  # ════════════════════════════════════════════════════════════
  - label: ":kubernetes: Deploy to EKS Staging (Helm)"
    command: |
      apk add --no-cache curl bash openssl git python3 py3-pip
      pip3 install awscli --break-system-packages 2>/dev/null
      curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      curl -LO "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl" && chmod +x kubectl && mv kubectl /usr/local/bin/

      echo "--- Configuring kubectl for EKS cluster: $$EKS_CLUSTER"
      aws eks update-kubeconfig --name $$EKS_CLUSTER --region $$AWS_REGION

      TAG=$$(buildkite-agent meta-data get "deploy-tag" 2>/dev/null || echo "v1")
      STRATEGY=$$(buildkite-agent meta-data get "deploy-strategy" 2>/dev/null || echo "rolling")
      echo "--- Deploy config:"
      echo "    Image tag: $$TAG"
      echo "    Strategy: $$STRATEGY"
      echo "    Namespace: $$NAMESPACE"
      echo ""

      echo "--- Building Helm dependencies"
      for chart in product-service order-service marketplace-web artist-service search-service; do
        helm dependency build helm/charts/$$chart 2>/dev/null || true
      done

      echo ""
      for svc in product-service order-service search-service artist-service marketplace-web; do
        echo "--- Deploying $$svc"
        helm upgrade --install $$svc ./helm/charts/$$svc \
          -n $$NAMESPACE \
          -f ./helm/environments/staging/values.yaml \
          --set image.registry=$$ECR_REGISTRY \
          --set image.repository=rawcanvas/$$svc \
          --set image.tag=$$TAG \
          --set image.pullPolicy=Always \
          --set ingress.enabled=false \
          --set initContainers=null \
          --timeout 180s
        echo "  ✓ $$svc deployed"
      done

      echo ""
      echo "--- Deployment Status"
      kubectl get pods -n $$NAMESPACE -o wide
      echo ""
      echo "--- Services"
      kubectl get svc -n $$NAMESPACE
    plugins:
      - kubernetes:
          podSpec:
            containers:
              - image: public.ecr.aws/docker/library/alpine:3.20
    branches: "main"

  - wait

  # ════════════════════════════════════════════════════════════
  # STAGE 7: POST-DEPLOY SMOKE TEST
  # ════════════════════════════════════════════════════════════
  - label: ":white_check_mark: Post-Deploy Smoke Test"
    command: |
      apk add --no-cache curl python3 py3-pip
      pip3 install awscli --break-system-packages 2>/dev/null
      curl -LO "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl" && chmod +x kubectl && mv kubectl /usr/local/bin/
      aws eks update-kubeconfig --name $$EKS_CLUSTER --region $$AWS_REGION

      LB=$$(kubectl get svc marketplace-web-lb -n $$NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
      echo "--- Testing live deployment at: http://$$LB"
      echo ""

      PASS=true

      echo "--- Test 1: Homepage"
      STATUS=$$(curl -s -o /dev/null -w '%{http_code}' "http://$$LB/" --max-time 10)
      [ "$$STATUS" = "200" ] && echo "  ✓ Homepage: HTTP 200" || (echo "  ✗ Homepage: HTTP $$STATUS" && PASS=false)

      echo "--- Test 2: Products API"
      STATUS=$$(curl -s -o /dev/null -w '%{http_code}' "http://$$LB/api/v1/products" --max-time 10)
      [ "$$STATUS" = "200" ] && echo "  ✓ Products API: HTTP 200" || (echo "  ✗ Products API: HTTP $$STATUS" && PASS=false)

      echo "--- Test 3: Categories API"
      STATUS=$$(curl -s -o /dev/null -w '%{http_code}' "http://$$LB/api/v1/categories" --max-time 10)
      [ "$$STATUS" = "200" ] && echo "  ✓ Categories API: HTTP 200" || (echo "  ✗ Categories API: HTTP $$STATUS" && PASS=false)

      echo "--- Test 4: Artists API"
      STATUS=$$(curl -s -o /dev/null -w '%{http_code}' "http://$$LB/api/v1/artists" --max-time 10)
      [ "$$STATUS" = "200" ] && echo "  ✓ Artists API: HTTP 200" || (echo "  ✗ Artists API: HTTP $$STATUS" && PASS=false)

      echo "--- Test 5: Search"
      STATUS=$$(curl -s -o /dev/null -w '%{http_code}' "http://$$LB/search?q=anime" --max-time 10)
      [ "$$STATUS" = "200" ] && echo "  ✓ Search page: HTTP 200" || (echo "  ✗ Search: HTTP $$STATUS" && PASS=false)

      echo ""
      if $$PASS; then
        echo "========================================="
        echo "  ✓ ALL SMOKE TESTS PASSED"
        echo "  Live: http://$$LB"
        echo "========================================="
      else
        echo "========================================="
        echo "  ✗ SOME TESTS FAILED — check above"
        echo "========================================="
        exit 1
      fi
    plugins:
      - kubernetes:
          podSpec:
            containers:
              - image: public.ecr.aws/docker/library/alpine:3.20
    branches: "main"
