# ============================================================
# CI Pipeline — Runs on every PR and push to main
# ============================================================
# Matrix strategy builds all services in parallel.
# Stages: Detect changes → Lint → Test → Build → Security Scan → Push
#
# After CI passes, Buildkite picks up the tagged image from ECR
# and runs the CD pipeline (canary deploy → prod).
# See .buildkite/pipeline.yml for the deployment flow.
# ============================================================

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect which services changed ──────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            product-service:
              - 'services/product-service/**'
            order-service:
              - 'services/order-service/**'
            marketplace-web:
              - 'services/marketplace-web/**'
            artist-service:
              - 'services/artist-service/**'
            search-service:
              - 'services/search-service/**'
            monolith-service:
              - 'services/monolith-service/**'

  # ── Node.js Services (lint, test, build) ───────────────
  node-services:
    needs: changes
    if: |
      contains(needs.changes.outputs.services, 'product-service') ||
      contains(needs.changes.outputs.services, 'order-service') ||
      contains(needs.changes.outputs.services, 'marketplace-web') ||
      contains(needs.changes.outputs.services, 'search-service') ||
      contains(needs.changes.outputs.services, 'monolith-service')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - product-service
          - order-service
          - marketplace-web
          - search-service
          - monolith-service
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci || npm install

      - name: Lint
        working-directory: services/${{ matrix.service }}
        run: npm run lint --if-present

      - name: Test
        working-directory: services/${{ matrix.service }}
        run: npm test --if-present

      - name: Build Docker image
        run: |
          docker build \
            -t printforge/${{ matrix.service }}:${{ github.sha }} \
            ./services/${{ matrix.service }}

      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: printforge/${{ matrix.service }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

      # ── Push to ECR (only on main) ──────────────────────
      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push image
        if: github.ref == 'refs/heads/main'
        run: |
          ECR="${{ steps.ecr.outputs.registry }}/printforge/${{ matrix.service }}"
          docker tag printforge/${{ matrix.service }}:${{ github.sha }} $ECR:${{ github.sha }}
          docker tag printforge/${{ matrix.service }}:${{ github.sha }} $ECR:latest
          docker push $ECR:${{ github.sha }}
          docker push $ECR:latest

  # ── Go Service (lint, test, build) ─────────────────────
  go-service:
    needs: changes
    if: contains(needs.changes.outputs.services, 'artist-service')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: services/artist-service/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: services/artist-service

      - name: Test
        working-directory: services/artist-service
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Build Docker image
        run: docker build -t printforge/artist-service:${{ github.sha }} ./services/artist-service

      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: printforge/artist-service:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-artist-service.sarif'
          severity: 'CRITICAL,HIGH'

  # ── Dockerfile Linting ─────────────────────────────────
  dockerfile-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

  # ── Secret Scanning ────────────────────────────────────
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
