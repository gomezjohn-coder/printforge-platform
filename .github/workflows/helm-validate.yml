# ============================================================
# Helm Chart Validation — Runs on changes to helm/
# ============================================================

name: Helm Validate

on:
  pull_request:
    paths:
      - 'helm/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Helm Lint (all charts)
        run: |
          for chart in helm/charts/*/; do
            echo "=== Linting ${chart} ==="
            helm lint "${chart}" || exit 1
          done

      - name: Helm Template (render all charts)
        run: |
          for chart in product-service order-service marketplace-web artist-service search-service; do
            echo "=== Rendering ${chart} ==="
            helm template "${chart}" "helm/charts/${chart}" \
              -f helm/environments/local/values.yaml \
              > "/tmp/${chart}-rendered.yaml"
          done

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate against K8s schemas (1.28, 1.29, 1.30)
        run: |
          for version in 1.28.0 1.29.0 1.30.0; do
            echo "=== Validating against K8s ${version} ==="
            for rendered in /tmp/*-rendered.yaml; do
              kubeconform \
                -kubernetes-version "${version}" \
                -strict \
                -summary \
                "${rendered}" || exit 1
            done
          done

      - name: Helm Diff (if chart exists in cluster)
        if: false  # Enabled when connected to a cluster
        run: |
          helm plugin install https://github.com/databus23/helm-diff
          for chart in product-service order-service marketplace-web artist-service search-service; do
            helm diff upgrade "${chart}" "helm/charts/${chart}" \
              -n printforge \
              -f helm/environments/staging/values.yaml || true
          done
