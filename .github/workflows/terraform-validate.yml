# ============================================================
# Terraform Validation — Runs on changes to terraform/
# ============================================================

name: Terraform Validate

on:
  pull_request:
    paths:
      - 'terraform/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform/

      - name: Terraform Validate (all modules)
        run: |
          for mod in terraform/modules/*/; do
            echo "=== Validating ${mod} ==="
            cd "${mod}"
            terraform init -backend=false > /dev/null 2>&1
            terraform validate
            cd - > /dev/null
          done

      - name: Install TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint
        run: |
          tflint --init
          for mod in terraform/modules/*/; do
            echo "=== Linting ${mod} ==="
            tflint --chdir="${mod}" || true
          done

      - name: Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          output_format: cli
          soft_fail: true

      - name: Infracost (cost estimation)
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
        if: secrets.INFRACOST_API_KEY != ''

      - name: Generate Infracost Report
        if: secrets.INFRACOST_API_KEY != ''
        run: |
          infracost breakdown \
            --path terraform/environments/production/ \
            --format json \
            --out-file /tmp/infracost.json
          infracost output \
            --path /tmp/infracost.json \
            --format github-comment \
            --out-file /tmp/infracost-comment.md

      - name: Post Infracost Comment
        if: github.event_name == 'pull_request' && secrets.INFRACOST_API_KEY != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/infracost-comment.md', 'utf8');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
