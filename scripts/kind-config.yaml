# Kind cluster configuration for PrintForge local development
#
# Features:
#   - Multi-node cluster (1 control-plane + 2 workers)
#   - Port mappings for ingress (80, 443)
#   - Node labels for ingress-nginx affinity
#   - Kubeadm patches for PodSecurity admission
#
# Usage:
#   kind create cluster --config scripts/kind-config.yaml --name printforge-dev
#
# Reference: https://kind.sigs.k8s.io/docs/user/configuration/

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

networking:
  # Use the default CNI (kindnet)
  disableDefaultCNI: false
  # Pod subnet
  podSubnet: "10.244.0.0/16"
  # Service subnet
  serviceSubnet: "10.96.0.0/16"

nodes:
  # ── Control Plane ─────────────────────────────────────────────────
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
      - |
        kind: ClusterConfiguration
        apiServer:
          extraArgs:
            # Enable PodSecurity admission
            enable-admission-plugins: "PodSecurity,NamespaceLifecycle,LimitRanger,ServiceAccount,DefaultStorageClass,DefaultTolerationSeconds,MutatingAdmissionWebhook,ValidatingAdmissionWebhook,ResourceQuota"
    extraPortMappings:
      # HTTP ingress
      - containerPort: 80
        hostPort: 80
        protocol: TCP
        listenAddress: "127.0.0.1"
      # HTTPS ingress
      - containerPort: 443
        hostPort: 443
        protocol: TCP
        listenAddress: "127.0.0.1"
      # NodePort range (for debugging individual services)
      - containerPort: 30000
        hostPort: 30000
        protocol: TCP
        listenAddress: "127.0.0.1"
      - containerPort: 30001
        hostPort: 30001
        protocol: TCP
        listenAddress: "127.0.0.1"

  # ── Worker Node 1 ────────────────────────────────────────────────
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "workload=application"

  # ── Worker Node 2 ────────────────────────────────────────────────
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "workload=application"
