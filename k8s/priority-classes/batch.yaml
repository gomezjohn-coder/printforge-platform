# Batch priority — cron jobs, background workers, data pipelines
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: printforge-batch
  labels:
    app.kubernetes.io/part-of: printforge
value: 10
globalDefault: false
preemptionPolicy: Never
description: "Low priority for batch jobs. Will not preempt other pods."
