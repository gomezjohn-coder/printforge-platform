# Staging resource quotas — lower limits to save costs
apiVersion: v1
kind: ResourceQuota
metadata:
  name: staging-quota
  namespace: printforge-staging
  labels:
    app.kubernetes.io/part-of: printforge
    environment: staging
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "50"
    services: "15"
    configmaps: "30"
    secrets: "20"
    persistentvolumeclaims: "5"
