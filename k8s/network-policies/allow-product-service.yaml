# product-service network policy — the catalog + SKU generation hub
# Ingress: from marketplace-web on 3001, from order-service on 3001 (checkout)
# Egress: to artist-service:8080, search-service:3002, postgres:5432, redis:6379
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-product-service
  namespace: printforge
  labels:
    app.kubernetes.io/part-of: printforge
    policy-type: service-allow
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: product-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Accept traffic from marketplace-web (catalog browsing)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: marketplace-web
      ports:
        - protocol: TCP
          port: 3001
    # Accept traffic from order-service (cart validation at checkout)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: order-service
      ports:
        - protocol: TCP
          port: 3001
    # Accept traffic from ingress controller (for /metrics, /healthz)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3001
  egress:
    # To artist-service (fetch uploaded design metadata for SKU generation)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: artist-service
      ports:
        - protocol: TCP
          port: 8080
    # To search-service (index new products)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: search-service
      ports:
        - protocol: TCP
          port: 3002
    # To PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # To Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
