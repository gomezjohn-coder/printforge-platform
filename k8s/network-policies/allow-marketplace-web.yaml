# marketplace-web can reach product-service (3001) and order-service (3003)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-marketplace-web
  namespace: printforge
  labels:
    app.kubernetes.io/part-of: printforge
    policy-type: service-allow
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: marketplace-web
  policyTypes:
    - Egress
    - Ingress
  ingress:
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/component: controller
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Allow traffic to product-service (catalog)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: product-service
      ports:
        - protocol: TCP
          port: 3001
    # Allow traffic to order-service (checkout)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: order-service
      ports:
        - protocol: TCP
          port: 3003
