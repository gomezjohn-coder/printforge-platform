apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: printforge
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: printforge
            - name: POSTGRES_PASSWORD
              value: printforge_dev
            - name: POSTGRES_DB
              value: printforge
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "printforge"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: printforge
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
