{{/*
order-service secrets
=====================
In production these values come from AWS Secrets Manager via the External
Secrets Operator (see Terraform IRSA role). The template below is a fallback
for local/kind clusters — DO NOT commit real credentials here.
*/}}
{{- if .Values.secret.createLocalFallback }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secretRef }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ .Values.secret.databaseUrl | default "postgres://printforge:printforge_dev@postgres:5432/printforge" | quote }}
  redis-url: {{ .Values.secret.redisUrl | default "redis://redis:6379" | quote }}
  stripe-api-key: {{ .Values.secret.stripeApiKey | default "sk_test_LOCAL_ONLY" | quote }}
{{- end }}
