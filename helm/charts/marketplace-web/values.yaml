replicaCount: 2
revisionHistoryLimit: 5

image:
  registry: ""
  repository: printforge/marketplace-web
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

containerPort: 3000

service:
  type: ClusterIP
  port: 3000
  targetPort: http
  annotations: {}
  additionalPorts: []

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "5m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: printforge.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: marketplace-web-tls
      hosts:
        - printforge.io
        - www.printforge.io

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

probes:
  startup:
    path: /api/health
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30
  liveness:
    path: /api/health
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /api/health
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      maxPods: 2
      maxPercent: 50
    scaleDown:
      stabilizationWindowSeconds: 300
      maxPods: 1

podDisruptionBudget:
  enabled: true
  minAvailable: 1

serviceAccount:
  create: true
  name: ""
  annotations: {}

automountServiceAccountToken: false

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

terminationGracePeriodSeconds: 30

configMapRef: ""
secretRef: ""

env:
  - name: NODE_ENV
    value: production
  - name: PORT
    value: "3000"
  - name: NEXT_PUBLIC_API_URL
    value: "https://api.printforge.io"
  - name: API_URL
    value: "http://product-service:3001"
  - name: ORDER_SERVICE_URL
    value: "http://order-service:3003"

config:
  NEXT_TELEMETRY_DISABLED: "1"

networkPolicy:
  enabled: true

podLabels: {}
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
volumeMounts: []
volumes: []
additionalPorts: []
extraEnvFrom: []
initContainers: []
