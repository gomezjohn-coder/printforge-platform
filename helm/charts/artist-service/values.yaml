replicaCount: 2
revisionHistoryLimit: 5

image:
  registry: ""
  repository: printforge/artist-service
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Go service - lightweight, low resource footprint
containerPort: 8080

service:
  type: ClusterIP
  port: 8080
  targetPort: http
  annotations: {}
  additionalPorts: []

ingress:
  enabled: false

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"

probes:
  startup:
    path: /healthz
    initialDelaySeconds: 2
    periodSeconds: 3
    timeoutSeconds: 2
    failureThreshold: 10
  liveness:
    path: /healthz
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    path: /readyz
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
    successThreshold: 1

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      maxPods: 2
      maxPercent: 100
    scaleDown:
      stabilizationWindowSeconds: 300
      maxPods: 1

podDisruptionBudget:
  enabled: true
  minAvailable: 1

serviceAccount:
  create: true
  name: ""
  annotations: {}
    # eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/artist-service-s3

automountServiceAccountToken: false

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

terminationGracePeriodSeconds: 15

configMapRef: ""
secretRef: artist-service-secrets

env:
  - name: PORT
    value: "8080"
  - name: LOG_LEVEL
    value: info
  - name: AWS_REGION
    value: us-west-2
  - name: S3_BUCKET
    valueFrom:
      configMapKeyRef:
        name: artist-service
        key: S3_BUCKET
  - name: S3_UPLOAD_PREFIX
    value: "uploads/artists"
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: artist-service-secrets
        key: database-url

config:
  S3_BUCKET: printforge-assets
  MAX_UPLOAD_SIZE: "52428800"
  ALLOWED_FILE_TYPES: "image/png,image/jpeg,image/webp,application/pdf"
  THUMBNAIL_SIZES: "150,300,600"

networkPolicy:
  enabled: true

podLabels: {}
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
volumeMounts: []
volumes: []
additionalPorts: []
extraEnvFrom: []
initContainers: []
