# =============================================================================
# Staging Environment — EKS Deployment
# =============================================================================
# Usage: helm upgrade --install <chart> ./helm/charts/<chart> \
#          -n printforge \
#          -f ./helm/environments/staging/values.yaml \
#          --set image.repository=646294700619.dkr.ecr.ap-southeast-2.amazonaws.com/rawcanvas/<chart> \
#          --set image.tag=v1
# =============================================================================

replicaCount: 1

image:
  pullPolicy: Always

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "250m"

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

networkPolicy:
  enabled: false

ingress:
  enabled: false

env:
  - name: NODE_ENV
    value: staging
  - name: LOG_LEVEL
    value: debug
  - name: LOG_FORMAT
    value: json
  - name: DATABASE_URL
    value: postgres://printforge:printforge_dev@postgres:5432/printforge
  - name: REDIS_URL
    value: redis://redis:6379
  - name: PRODUCT_SERVICE_URL
    value: http://product-service:3001
  - name: ORDER_SERVICE_URL
    value: http://order-service:3003
  - name: SEARCH_SERVICE_URL
    value: http://search-service:3002
  - name: ARTIST_SERVICE_URL
    value: http://artist-service:8080

canary:
  enabled: false

terminationGracePeriodSeconds: 15
