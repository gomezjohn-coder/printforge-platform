# =============================================================================
# Local Development Environment (Kind cluster)
# =============================================================================
# Usage: helm upgrade --install <chart> ./helm/charts/<chart> \
#          -f ./helm/environments/local/values.yaml
# =============================================================================

# -- Single replica, no HA needed locally
replicaCount: 1

image:
  pullPolicy: Never  # Use locally built images in Kind

# -- Minimal resources for local development
resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"

# -- Disable HPA locally
autoscaling:
  enabled: false

# -- Disable PDB locally (single replica)
podDisruptionBudget:
  enabled: false

# -- Disable network policies locally
networkPolicy:
  enabled: false

# -- No TLS in local environment
ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: localhost
      paths:
        - path: /
          pathType: Prefix
  tls: []

# -- Relaxed probes for local dev (slower startup)
probes:
  startup:
    initialDelaySeconds: 2
    periodSeconds: 3
    failureThreshold: 60
  liveness:
    periodSeconds: 30
    failureThreshold: 5
  readiness:
    periodSeconds: 10
    failureThreshold: 5

# -- Local environment variables (override secretKeyRef with plain values)
env:
  - name: NODE_ENV
    value: development
  - name: LOG_LEVEL
    value: debug
  - name: LOG_FORMAT
    value: text
  - name: PORT
    value: "3001"
  - name: DATABASE_URL
    value: "sqlite::memory:"
  - name: REDIS_URL
    value: "redis://localhost:6379"
  - name: ARTIST_SERVICE_URL
    value: "http://artist-service:8080"
  - name: SEARCH_SERVICE_URL
    value: "http://search-service:3002"
  - name: PRODUCT_SERVICE_URL
    value: "http://product-service:3001"
  - name: ORDER_SERVICE_URL
    value: "http://order-service:3003"
  - name: MONOLITH_SERVICE_URL
    value: "http://monolith-service:4000"
  - name: NEXT_PUBLIC_API_URL
    value: "http://localhost:3001"
  - name: API_URL
    value: "http://product-service:3001"

# -- Disable secret/configmap refs (no secrets in local cluster)
secretRef: ""
configMapRef: ""

# -- No init containers locally (no external DB to wait for)
initContainers: []

# -- Disable canary deployments locally
canary:
  enabled: false

# -- Disable service account IRSA locally
serviceAccount:
  create: true
  annotations: {}

terminationGracePeriodSeconds: 5
